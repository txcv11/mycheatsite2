<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K44N NETWORKS | CORE HUB</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div id="snow-container"></div>

    <div class="lang-selector">
        <span onclick="setLanguage('en')">EN</span> | <span onclick="setLanguage('tr')">TR</span>
    </div>

    <div class="wrapper">
        <div id="auth-module" class="glass-card auth-container">
            <div class="auth-header">
                <i class="fas fa-shield-halved"></i>
                <h2 id="txt-main-title">Access Terminal</h2>
            </div>
            <div class="auth-inputs">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="user-input" placeholder="Username">
                </div>
                <div class="input-group hidden">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="pass-input" placeholder="Password">
                </div>
                <div class="input-group hidden">
                    <i class="fas fa-key"></i>
                    <input type="text" id="lic-input" placeholder="License Key">
                </div>
            </div>
            <button id="next-btn" class="glow-btn-action" onclick="handleAuthStep()">
                <span>Next</span> <i class="fas fa-chevron-right"></i>
            </button>
            <p id="auth-toggle-text" class="auth-footer">Need access? <span onclick="toggleMode()" class="link">Sign Up</span></p>
        </div>

        <div id="dashboard" class="glass-card wide hidden">
            <div class="dash-top">
                <button class="back-pill" onclick="resetNav()"><i class="fas fa-arrow-left"></i> Categories</button>
                <div class="user-badge"><i class="fas fa-user-circle"></i> <span id="user-display"></span></div>
            </div>

            <h2 id="txt-welcome" class="section-title">SYSTEM ACTIVE:</h2>

            <div id="category-grid" class="giant-grid">
                <div class="giant-card" onclick="navTo('gt')">
                    <span class="badge ud">UD</span>
                    <i class="fas fa-microchip"></i>
                    <h3>Growtopia</h3>
                </div>
                <div class="giant-card" onclick="navTo('dr')">
                    <span class="badge ud">UD</span>
                    <i class="fas fa-skull"></i>
                    <h3>Dungeon Rampage</h3>
                </div>
                <div class="giant-card" onclick="navTo('rbx')">
                    <span class="badge lk">LOCKED</span>
                    <i class="fas fa-robot"></i>
                    <h3>Roblox</h3>
                </div>
                <div class="giant-card" onclick="navTo('wolfteam')">
                    <span class="badge dt">DETECT</span>
                    <i class="fas fa-paw"></i>
                    <h3>Wolfteam</h3>
                </div>
                <div class="giant-card" onclick="navTo('fivem')">
                    <span class="badge dt">DETECT</span>
                    <i class="fas fa-car"></i>
                    <h3>Fivem</h3>
                </div>
                <div class="giant-card" onclick="navTo('rust')">
                    <span class="badge lk">PRIVATE</span>
                    <i class="fas fa-radiation"></i>
                    <h3>Rust</h3>
                </div>
            </div>

            <div id="product-view" class="hidden">
                <div id="item-container" class="modern-list-container"></div>
            </div>

            <div id="detail-view" class="download-panel hidden">
                <div class="panel-tabs">
                    <span class="tab active">Product Info</span>
                    <span class="tab">Changelogs</span>
                </div>
                <div class="panel-content">
                    <div class="info-left">
                        <h3 id="item-title">---</h3>
                        <p id="txt-desc">---</p>
                        <div class="notice-box">
                            <h4 class="notice-title">NOTICE OF RESPONSIBILITY</h4>
                            <p id="txt-warn">---</p>
                        </div>
                    </div>
                    <div class="info-right">
                        <button id="dl-btn" class="start-dl-btn" onclick="beginSequence()">START DOWNLOAD</button>
                        <div id="sequence-box" class="hidden">
                            <span id="txt-prep">Preparing...</span>
                            <div id="countdown" class="count-big">10</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
